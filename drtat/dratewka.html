<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Dratewka - The Game</title>
    <style>
        @font-face {
            font-family: 'PressStart2P';
            src: url('PressStart2P.ttf');
        }

        body {
            background-color: #1a1a1a;
            font-family: 'PressStart2P', sans-serif;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            width: 850px;
        }

        #location-description {
            margin-bottom: 10px;
            height: 25px;
            text-align: center;
        }

        #view-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        #image-wrapper {
            border: 4px solid white;
            background-color: black;
            line-height: 0;
        }

        img#view-img {
            width: 600px;
            height: 340px;
            image-rendering: pixelated;
        }

        #compass-container {
            width: 160px;
            height: 160px;
            background-image: url('img/compass.png');
            background-size: contain;
            background-repeat: no-repeat;
            position: relative;
            flex-shrink: 0;
        }

        .compass-mask {
            background-color: black;
            position: absolute;
            display: none;
        }

        #mask-N {
            width: 30px;
            height: 9px;
            top: 0;
            left: 65px;
        }

        #mask-S {
            width: 30px;
            height: 13px;
            bottom: 85px;
            left: 65px;
        }

        #mask-W {
            width: 20px;
            height: 20px;
            left: 0;
            top: 9px;
        }

        #mask-E {
            width: 20px;
            height: 20px;
            right: 0px;
            top: 9px;
        }

        .game-text {
            margin: 8px 0;
            min-height: 1.2em;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        #input-area {
            margin-top: 20px;
            display: flex;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            font-family: 'PressStart2P';
            font-size: 16px;
            outline: none;
            width: 100%;
            margin-left: 10px;
            text-transform: uppercase;
        }

        input:disabled {
            opacity: 0;
        }

        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #intro-img {
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
        }

        .win-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .win-screen img {
            border: 4px solid white;
            margin-bottom: 20px;
            width: 600px;
            image-rendering: pixelated;
        }
    </style>
</head>

<body>

    <div id="intro-overlay">
        <img id="intro-img" src="">
        <audio id="intro-audio" src="hejnal.mp3"></audio>
    </div>

    <div id="game-container">
        <div id="location-description" class="game-text"></div>
        <div id="view-area">
            <div id="image-wrapper"><img id="view-img" src="" alt=""></div>
            <div id="compass-container">
                <div id="mask-N" class="compass-mask"></div>
                <div id="mask-S" class="compass-mask"></div>
                <div id="mask-W" class="compass-mask"></div>
                <div id="mask-E" class="compass-mask"></div>
            </div>
        </div>
        <div id="ui-text-area">
            <div id="exits" class="game-text"></div>
            <div id="visible-items" class="game-text"></div>
            <div id="inventory" class="game-text"></div>
            <div id="message" class="game-text" style="color: yellow;"></div>
        </div>
        <div id="input-area">
            <span id="prompt-label">WHAT NOW?</span>
            <input type="text" id="command-input" autofocus autocomplete="off">
        </div>
    </div>

    <script>

            24: { d: "a SPADE", f: 1, n: "SPADE" }, 25: { d: "SULPHUR", f: 1, n: "SULPHUR" },
            26: { d: "a solid poison", f: 0, n: "SOLID POISON" }, 27: { d: "a BUCKET", f: 1, n: "BUCKET" },
            28: { d: "TAR", f: 1, n: "TAR" }, 29: { d: "a liquid poison", f: 0, n: "LIQUID POISON" },

            32: { d: "a FISH", f: 1, n: "FISH" }, 33: { d: "a KNIFE", f: 1, n: "KNIFE" },
            34: { d: "a DRAGONSKIN", f: 1, n: "DRAGONSKIN" }, 35: { d: "a dragonskin SHOES", f: 1, n: "SHOES" },
            36: { d: "a PRIZE", f: 1, n: "PRIZE" }, 37: { d: "a SHEEP", f: 1, n: "SHEEP" }

        const locations = [
            [
                { desc: "You are inside a brimstone mine", path: "11.gif", rgb: "rgb(235,211,64)", directions: ["EAST"], items: [] },
                { desc: "You are at the entrance to the mine", path: "12.gif", rgb: "rgb(89,93,87)", directions: ["WEST", "EAST"], items: [] },
                { desc: "A hill", path: "13.gif", rgb: "rgb(117,237,243)", directions: ["SOUTH", "WEST", "EAST"], items: [31] },
                { desc: "Some bushes", path: "14.gif", rgb: "rgb(202,230,51)", directions: ["WEST", "EAST"], items: [] },
                { desc: "An old deserted hut", path: "15.gif", rgb: "rgb(220,204,61)", directions: ["WEST", "EAST"], items: [27] },
                { desc: "The edge of a forest", path: "16.gif", rgb: "rgb(167,245,63)", directions: ["WEST", "EAST"], items: [] },
                { desc: "A dark forest", path: "17.gif", rgb: "rgb(140,253,99)", directions: ["SOUTH", "WEST"], items: [14] }
            ],
            [
                { desc: "A man nearby making tar", path: "21.gif", rgb: "rgb(255,190,99)", directions: ["SOUTH", "EAST"], items: [] },
                { desc: "A timber yard", path: "22.gif", rgb: "rgb(255,190,99)", directions: ["SOUTH", "WEST", "EAST"], items: [] },
                { desc: "You are by a roadside shrine", path: "23.gif", rgb: "rgb(167,245,63)", directions: ["NORTH", "SOUTH", "WEST", "EAST"], items: [10] },
                { desc: "You are by a small chapel", path: "24.gif", rgb: "rgb(212,229,36)", directions: ["WEST", "EAST"], items: [] },
                { desc: "You are on a road leading to a wood", path: "25.gif", rgb: "rgb(167,245,63)", directions: ["SOUTH", "WEST", "EAST"], items: [] },
                { desc: "You are in a forest", path: "26.gif", rgb: "rgb(167,245,63)", directions: ["WEST", "EAST"], items: [] },
                { desc: "You are in a deep forest", path: "27.gif", rgb: "rgb(140,253,99)", directions: ["NORTH", "WEST"], items: [18] }
            ],
            [
                { desc: "You are by the Vistula River", path: "31.gif", rgb: "rgb(122,232,252)", directions: ["NORTH", "EAST"], items: [] },
                { desc: "You are by the Vistula River", path: "32.gif", rgb: "rgb(140,214,255)", directions: ["NORTH", "WEST"], items: [32] },
                { desc: "You are on a bridge over river", path: "33.gif", rgb: "rgb(108,181,242)", directions: ["NORTH", "SOUTH"], items: [] },
                { desc: "You are by the old tavern", path: "34.gif", rgb: "rgb(255,189,117)", directions: ["EAST"], items: [] },
                { desc: "You are at the town's end", path: "35.gif", rgb: "rgb(255,190,99)", directions: ["NORTH", "SOUTH", "WEST"], items: [] },
                { desc: "You are in a butcher's shop", path: "36.gif", rgb: "rgb(255,188,102)", directions: ["SOUTH"], items: [] },
                { desc: "You are in a cooper's house", path: "37.gif", rgb: "rgb(255,188,102)", directions: ["SOUTH"], items: [] }
            ],
            [
                { desc: "You are in the Wawel Castle", path: "41.gif", rgb: "rgb(255,176,141)", directions: ["EAST"], items: [] },
                { desc: "You are inside a dragon's cave", path: "42.gif", rgb: "rgb(198,205,193)", directions: ["WEST", "EAST"], items: [] },
                { desc: "A perfect place to set a trap", path: "43.gif", rgb: "rgb(255,176,141)", directions: ["NORTH", "WEST"], items: [] },
                { desc: "You are by the water mill", path: "44.gif", rgb: "rgb(255,190,99)", directions: ["EAST"], items: [21] },
                { desc: "You are at a main crossroad", path: "45.gif", rgb: "rgb(255,190,99)", directions: ["NORTH", "SOUTH", "WEST", "EAST"], items: [] },

            ],
            [

                { desc: "You are by a swift stream", path: "54.gif", rgb: "rgb(108,181,242)", directions: ["EAST"], items: [] },
                { desc: "You are on a street leading forest", path: "55.gif", rgb: "rgb(255,190,99)", directions: ["NORTH", "SOUTH", "WEST"], items: [33] },
                { desc: "You are in a woodcutter's backyard", path: "56.gif", rgb: "rgb(255,190,99)", directions: ["NORTH", "SOUTH"], items: [] },
                { desc: "You are in a shoemaker's house", path: "57.gif", rgb: "rgb(254,194,97)", directions: ["NORTH"], items: [] }
            ],
            [
                null, null, null,
                { desc: "You are in a bleak funeral house", path: "64.gif", rgb: "rgb(254,194,97)", directions: ["EAST"], items: [24] },
                { desc: "You are on a path leading to the wood", path: "65.gif", rgb: "rgb(167,245,63)", directions: ["NORTH", "WEST", "EAST"], items: [] },
                { desc: "You are at the edge of a forest", path: "66.gif", rgb: "rgb(167,245,63)", directions: ["NORTH", "WEST", "EAST"], items: [] },
                { desc: "You are in a deep forest", path: "67.gif", rgb: "rgb(140,253,99)", directions: ["WEST"], items: [] }
            ]
        ];

        //   loc współrzędne gdzie akcja działa
        //   res ID przedmiotu co sie dostanie po akcji
        //   ok milestones
        const interactions = [
            { id: 10, loc: "56", res: 11, msg: "You opened a tool shed and took an axe", ok: false },
            { id: 11, loc: "67", res: 12, msg: "You cut sticks for sheeplegs", ok: false },
            { id: 12, loc: "43", res: 13, msg: "You prepared legs for your fake sheep", ok: true },
            { id: 14, loc: "34", res: 15, msg: "The tavern owner paid you money", ok: false },
            { id: 15, loc: "37", res: 16, msg: "The cooper sold you a new barrel", ok: false },
            { id: 16, loc: "43", res: 17, msg: "You made a nice sheeptrunk", ok: true },
            { id: 18, loc: "36", res: 19, msg: "The butcher gave you wool", ok: false },
            { id: 19, loc: "43", res: 20, msg: "You prepared skin for your fake sheep", ok: true },
            { id: 21, loc: "57", res: 22, msg: "You used your tools to make a rag", ok: false },
            { id: 22, loc: "43", res: 23, msg: "You made a fake sheephead", ok: true },
            { id: 24, loc: "11", res: 25, msg: "You are digging...", ok: false, delay: true },
            { id: 25, loc: "43", res: 26, msg: "You prepared a solid poison", ok: true },
            { id: 27, loc: "21", res: 28, msg: "You got a bucket full of tar", ok: false },
            { id: 28, loc: "43", res: 29, msg: "You prepared a liquid poison", ok: true },
            { id: 37, loc: "43", res: null, msg: "The dragon noticed your gift...", ok: true, delay: true, dragonKill: true },
            { id: 33, loc: "42", res: 34, msg: "You cut a piece of dragon's skin", ok: false, needsDeadDragon: true },
            { id: 34, loc: "57", res: 35, msg: "You used your tools to make shoes", ok: false },
            { id: 35, loc: "41", res: 36, msg: "The King is impressed by your shoes", ok: false, win: false },
            { id: 36, loc: "41", res: null, msg: " ", ok: false, win: true }
        ];

        class GameEngine {
            constructor() {
                // pozycja startowa 
                this.currentRow = 3; this.currentCol = 6;
                this.inventoryId = null; // max 1 item
                this.milestones = 0;
                this.dragonDead = false;
                this.messageTimer = null;
                this.textMode = false;   // vocab/gossips
                this.inIntro = true;
                this.isInputLocked = false;
                this.inputEl = document.getElementById('command-input');

                this.setupFocus();
                this.startIntro();
            }

            setupFocus() {
                document.addEventListener('click', () => {
                    if (!this.textMode && !this.inIntro && !this.isInputLocked) this.inputEl.focus();
                });
                this.inputEl.addEventListener('blur', () => {
                    if (!this.textMode && !this.inIntro && !this.isInputLocked) {
                        setTimeout(() => this.inputEl.focus(), 10);
                    }
                });
            }

            waitOrSkip(ms) {
                return new Promise(resolve => {
                    const timeout = setTimeout(() => { cleanup(); resolve(); }, ms);
                    const handleKey = (e) => { if (e.code === "Space") { cleanup(); resolve(); } };
                    const cleanup = () => {
                        clearTimeout(timeout);
                        window.removeEventListener('keydown', handleKey);
                    };
                    window.addEventListener('keydown', handleKey);
                });
            }

            // intro
            async startIntro() {
                const overlay = document.getElementById('intro-overlay');
                const img = document.getElementById('intro-img');
                const audio = document.getElementById('intro-audio');

                this.inputEl.disabled = true;

                img.src = "img/czołówka.jpg";
                audio.play().catch(() => { });
                await this.waitOrSkip(25000);
                audio.pause(); audio.currentTime = 0;

                img.src = "img/opis_A.jpg";
                await this.waitOrSkip(15000);

                img.src = "img/opis_B.jpg";
                await this.waitOrSkip(15000);

                this.inIntro = false;
                overlay.style.display = "none";
                this.displayLocation();
            }

            updateCompass(directions) {
                const masks = ["N", "S", "W", "E"];
                masks.forEach(m => document.getElementById(`mask-${m}`).style.display = 'block'); // Ukryj wszystko
                directions.forEach(d => document.getElementById(`mask-${d[0]}`).style.display = 'none'); // Odsłoń dostępne
            }

            // odświeżenie ui
            displayLocation() {
                if (this.inIntro) return;
                this.textMode = false;
                this.inputEl.disabled = false;

                const loc = locations[this.currentRow][this.currentCol];

                document.querySelectorAll('.game-text').forEach(el => el.style.display = "block");
                document.getElementById('input-area').style.visibility = "visible";

                document.getElementById('location-description').innerText = loc.desc;
                document.getElementById('view-img').src = "img/" + loc.path;
                document.getElementById('image-wrapper').style.backgroundColor = loc.rgb;

                let exitsStr = "";
                if (loc.directions.length > 0) {
                    exitsStr = "YOU CAN GO " + loc.directions.join(", ");
                } else {
                    exitsStr = "YOU CAN GO NOWHERE";
                }
                document.getElementById('exits').innerText = exitsStr;

                this.updateCompass(loc.directions);

                const items = loc.items.map(id => itemsData[id].d);
                let itemsStr = "";
                if (items.length > 0) {
                    itemsStr = "YOU SEE " + items.join(", ");
                } else {
                    itemsStr = "YOU SEE NOTHING";
                }
                document.getElementById('visible-items').innerText = itemsStr;

                let inventoryStr = "";
                if (this.inventoryId) {
                    inventoryStr = "YOU ARE CARRYING " + itemsData[this.inventoryId].d;
                } else {
                    inventoryStr = "YOU ARE CARRYING NOTHING";
                }
                document.getElementById('inventory').innerText = inventoryStr;

                this.inputEl.focus();
            }

            // zolte komunikaty
            setMessage(content, time = 3000) {
                const el = document.getElementById('message');
                el.innerText = content;
                clearTimeout(this.messageTimer);
                if (time !== Infinity) {
                    this.messageTimer = setTimeout(() => el.innerText = "", time);
                }
            }

            // Mechanika ruchu
            async move(k) {
                const loc = locations[this.currentRow][this.currentCol];
                let dir = k;
                if (k.length === 1) {
                    if (k === "N") { dir = "NORTH"; }
                    else if (k === "S") { dir = "SOUTH"; }
                    else if (k === "E") { dir = "EAST"; }
                    else if (k === "W") { dir = "WEST"; }
                }

                if (loc.directions.includes(dir)) {
                    // blokada przed wejsciem za smoka przed zabiciem go
                    if (this.currentRow === 3 && this.currentCol === 1 && dir === "WEST" && !this.dragonDead) {
                        this.isInputLocked = true;
                        this.inputEl.disabled = true;
                        this.setMessage("You can't go that way...");
                        await new Promise(r => setTimeout(r, 1500));
                        this.setMessage("The dragon sleeps in a cave!");
                        setTimeout(() => {
                            this.isInputLocked = false;
                            this.inputEl.disabled = false;
                            this.inputEl.focus();
                        }, 1500);
                        return;
                    }

                    if (dir === "NORTH") this.currentRow--;
                    if (dir === "SOUTH") this.currentRow++;
                    if (dir === "EAST") this.currentCol++;
                    if (dir === "WEST") this.currentCol--;

                    console.log("Moved to: " + dir);
                    this.setMessage("YOU ARE GOING " + dir);
                    this.displayLocation();
                } else {
                    this.setMessage("YOU CAN'T GO THAT WAY");
                }
            }


            take(name) {
                const loc = locations[this.currentRow][this.currentCol];
                const cleanName = name.trim().toUpperCase();
                const idStr = Object.keys(itemsData).find(key => itemsData[key].n === cleanName);
                const id = parseInt(idStr);

                if (!idStr || !loc.items.includes(id)) {
                    this.setMessage("THERE ISN'T ANYTHING LIKE THAT HERE");
                    return;
                }
                if (itemsData[id].f === 0) { this.setMessage("YOU CAN'T CARRY IT"); return; }
                if (this.inventoryId !== null) { this.setMessage("YOU ARE CARRYING SOMETHING"); return; }

                this.inventoryId = id;
                loc.items = loc.items.filter(i => i !== id);

                console.log("Taken: " + cleanName);
                this.setMessage("YOU ARE TAKING " + itemsData[id].d);
                this.displayLocation();
            }


            drop(name) {
                const cleanName = name.trim().toUpperCase();
                if (!this.inventoryId || itemsData[this.inventoryId].n !== cleanName) {
                    this.setMessage("YOU ARE NOT CARRYING IT");
                    return;
                }
                const loc = locations[this.currentRow][this.currentCol];
                // Limit 3 przedmiotów na lokację
                if (loc.items.filter(id => itemsData[id].f === 1).length >= 3) {
                    this.setMessage("YOU CAN'T STORE ANY MORE HERE");
                    return;
                }

                console.log("Dropped: " + cleanName);
                loc.items.push(this.inventoryId);
                this.inventoryId = null;
                this.displayLocation();
            }


            async use(name) {
                const cleanName = name.trim().toUpperCase();
                if (!this.inventoryId || itemsData[this.inventoryId].n !== cleanName) {
                    this.setMessage("YOU AREN'T CARRYING ANYTHING LIKE THAT");
                    return;
                }

                // sprawdzenie czy współrzędne i ID przedmiotu pasują do interakcji
                const currentCoords = (this.currentRow + 1).toString() + (this.currentCol + 1).toString();
                const dep = interactions.find(z => z.id === this.inventoryId && z.loc === currentCoords);

                if (!dep || (dep.needsDeadDragon && !this.dragonDead)) {
                    this.setMessage("NOTHING HAPPENED");
                    return;
                }

                this.isInputLocked = true;
                this.inputEl.disabled = true;

                const finalizeInteraction = () => {
                    console.log("Used: " + cleanName);

                    // wygrana
                    if (dep.win) {
                        document.body.innerHTML = `
                            <div class="win-screen">
                                <img src="img/win.gif" alt="You Win!">
                                <h1>GOOD ENDING</h1>
                            </div>`;
                        return;
                    }

                    // use sheep pod smokiem
                    if (dep.dragonKill) {
                        this.dragonDead = true;
                        locations[3][1].path = "DS68.gif"; // dead smok w jaskini
                        locations[3][1].desc = "You are inside a dragon's cave with a dead dragon";
                        locations[3][1].items.push(30);
                    }

                    // kamienie milowe logika
                    if (dep.ok) {
                        this.milestones++;
                        if (dep.res !== null) {
                            locations[this.currentRow][this.currentCol].items.push(dep.res);
                        }
                        this.inventoryId = null;

                        if (this.milestones === 6) {
                            locations[this.currentRow][this.currentCol].items = locations[this.currentRow][this.currentCol].items.filter(i => ![13, 17, 20, 23, 26, 29].includes(i));
                            locations[this.currentRow][this.currentCol].items.push(37); // Owca gotowa
                        }
                    } else {
                        // zwykła wymiana lub zużycie przedmiotu bez reszty
                        this.inventoryId = dep.res;
                    }

                    this.isInputLocked = false;
                    this.inputEl.disabled = false;
                    this.displayLocation();

                    
                    if (dep.id === 24) {
                        this.setMessage("That's enough sulphur for you");
                    } else {
                        this.setMessage(dep.msg);
                    }
                };

                // timeouty kopanie
                if (dep.delay && dep.id === 24) { 
                    this.setMessage("You are digging...", Infinity);
                    await new Promise(r => setTimeout(r, 2000));
                    this.setMessage("and digging...", Infinity);
                    await new Promise(r => setTimeout(r, 2000));
                    finalizeInteraction();
                } else if (dep.delay) {
                    
                    this.setMessage(dep.msg.split("...")[0] + "...", Infinity);
                    setTimeout(finalizeInteraction, 2000);
                } else {
                    finalizeInteraction();
                }
            }

            // vocab/gossip ekrany
            showTextScreen(t) {
                this.textMode = true;
                this.inputEl.disabled = true;
                document.getElementById('visible-items').style.display = "none";
                document.getElementById('inventory').style.display = "none";
                document.getElementById('message').style.display = "none";
                document.getElementById('input-area').style.visibility = "hidden";
                document.getElementById('exits').innerText = t;
            }
        }


        const game = new GameEngine();


        document.addEventListener('keydown', (e) => {
            if (game.inIntro) return;
            if (game.textMode) {
                game.displayLocation();
                return;
            }
            if (game.isInputLocked) return;

            if (e.key === "Enter") {
                const val = game.inputEl.value.trim().toUpperCase(); //case sensitive 2
                game.inputEl.value = "";
                if (!val) return;

                // parser komend
                const spaceIndex = val.indexOf(" ");
                let cmd, arg;

                if (spaceIndex === -1) {
                    cmd = val;
                    arg = "";
                } else {
                    cmd = val.substring(0, spaceIndex);
                    arg = val.substring(spaceIndex + 1);
                }

                // reakcja na komendy
                if (["N", "NORTH", "S", "SOUTH", "E", "EAST", "W", "WEST"].includes(cmd)) game.move(cmd);
                else if (cmd === "T" || cmd === "TAKE") game.take(arg);
                else if (cmd === "D" || cmd === "DROP") game.drop(arg);
                else if (cmd === "U" || cmd === "USE") game.use(arg);
                else if (cmd === "V" || cmd === "VOCABULARY") game.showTextScreen("NORTH or N, SOUTH or S\nWEST or W, EAST or E\nTAKE (object) or T (object)\nDROP (object) or D (object)\nUSE (object) or U (object)\nGOSSIPS or G, VOCABULARY or V\nPRESS ANY KEY");
                else if (cmd === "G" || cmd === "GOSSIPS") game.showTextScreen("The woodcutter lost his home key...\n The butcher likes fruit... The cooper\n is greedy... Dratewka plans to make a\n poisoned  bait for the dragon...  The\n tavern owner is buying food  from the\n pickers... Making a rag from a bag...\nPRESS ANY KEY");
                else game.setMessage("UNKNOWN COMMAND, TRY USING VOCABULARY OR V");
            }
        });
    </script>
