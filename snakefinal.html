<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Snake</title>
    <style>
        .kom {
            width: 20px;
            height: 20px;
            float: left;
            border: 1px solid black;
            background-image: url("snake-graphics.png");
            background-position: 0 -40px;
            background-size: 100px;
            background-repeat: no-repeat;
        }

        #pole {
            margin: 20px;
            overflow: hidden;
        }

        .wall {
            background-image: none;
            background: greenyellow;
        }

        .food {
            background-image: url("snake-graphics.png");
            background-repeat: no-repeat;
            background-position: 0px -60px;
        }

        .snake-head-up {
            background-position: -60px 0px;
        }

        .snake-head-right {
            background-position: -80px 0px;
        }

        .snake-head-down {
            background-position: -80px -20px;
        }

        .snake-head-left {
            background-position: -60px -20px;
        }

        .snake-body-v {
            background-position: -40px -20px;
        }

        .snake-body-h {
            background-position: -20px 0px;
        }

        .snake-tail-up {
            background-position: -80px -60px;
        }

        .snake-tail-right {
            background-position: -60px -60px;
        }

        .snake-tail-down {
            background-position: -60px -40px;
        }

        .snake-tail-left {
            background-position: -80px -40px;
        }

        .snake-corner-ur {
            background-position: 0px -20px;
        }

        .snake-corner-ul {
            background-position: -40px -40px;
        }

        .snake-corner-dr {
            background-position: 0px 0px;
        }

        .snake-corner-dl {
            background-position: -40px 0px;
        }
    </style>
</head>

<body onkeydown="keyDown(event)">
    <div id="pole"></div>

    <script>
        const pole = document.getElementById("pole");
        const sizex = 20;
        const sizey = 20;
        let dirchange = true;

        // grid
        for (let y = 0; y < sizey; y++) {
            for (let x = 0; x < sizex; x++) {
                let classes = `kom x-${x} y-${y}`;
                if (x === 0 || x === sizex - 1 || y === 0 || y === sizey - 1) {
                    classes += " wall";
                }
                pole.innerHTML += `<div class="${classes}"></div>`;
            }
        }
        pole.style.width = (sizex * 22) + "px";

        function cell(x, y) {
            return document.querySelector(`.x-${x}.y-${y}`);
        }

        // wąż
        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        let dir = "right";
        let food = null;
        let gameInterval = null;

        function spawnFood() {
            let x, y;
            do {
                x = Math.floor(Math.random() * (sizex - 2)) + 1;
                y = Math.floor(Math.random() * (sizey - 2)) + 1;
            } while (snake.some(seg => seg.x === x && seg.y === y));
            food = { x, y };
            cell(x, y).classList.add("food");
        }

        function keyDown(e) {
            if (!dirchange) return;
            if (e.key === "ArrowUp" && dir !== "down") { dir = "up"; dirchange = false; }
            if (e.key === "ArrowDown" && dir !== "up") { dir = "down"; dirchange = false; }
            if (e.key === "ArrowLeft" && dir !== "right") { dir = "left"; dirchange = false; }
            if (e.key === "ArrowRight" && dir !== "left") { dir = "right"; dirchange = false; }
        }

        function getDirection(a, b) {
            if (!a || !b) return null;
            if (a.x === b.x) {
                return a.y < b.y ? "down" : "up";
            } else if (a.y === b.y) {
                return a.x < b.x ? "right" : "left";
            }
            return null;
        }

        function gameStep() {
            let head = { ...snake[0] };
            if (dir === "up") head.y--;
            if (dir === "down") head.y++;
            if (dir === "left") head.x--;
            if (dir === "right") head.x++;

            // kolizja ze ścianą
            if (head.x <= 0 || head.x >= sizex - 1 || head.y <= 0 || head.y >= sizey - 1) {
                return gameOver();
            }

            // kolizja z samym sobą
            if (snake.slice(0, -1).some(seg => seg.x === head.x && seg.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            // jedzenie
            if (food && head.x === food.x && head.y === food.y) {
                cell(food.x, food.y).classList.remove("food");
                spawnFood();
            } else {
                let tail = snake.pop();
                const tailCell = cell(tail.x, tail.y);
                tailCell.classList.remove(
                    "snake", "snake-head-up", "snake-head-right", "snake-head-down", "snake-head-left",
                    "snake-body-h", "snake-body-v",
                    "snake-tail-up", "snake-tail-right", "snake-tail-down", "snake-tail-left",
                    "snake-corner-ur", "snake-corner-ul", "snake-corner-dr", "snake-corner-dl"
                );
            }

            drawSnake();
            dirchange = true;
        }

        function clearSnakeGraphics() {
            document.querySelectorAll(
                ".snake-head-up,.snake-head-right,.snake-head-down,.snake-head-left," +
                ".snake-body-h,.snake-body-v," +
                ".snake-tail-up,.snake-tail-right,.snake-tail-down,.snake-tail-left," +
                ".snake-corner-ur,.snake-corner-ul,.snake-corner-dr,.snake-corner-dl"
            ).forEach(e => {
                e.classList.remove(
                    "snake-head-up", "snake-head-right", "snake-head-down", "snake-head-left",
                    "snake-body-h", "snake-body-v",
                    "snake-tail-up", "snake-tail-right", "snake-tail-down", "snake-tail-left",
                    "snake-corner-ur", "snake-corner-ul", "snake-corner-dr", "snake-corner-dl"
                );
            });
        }

        function drawSnake() {
            clearSnakeGraphics();

            snake.forEach((seg, i) => {
                const el = cell(seg.x, seg.y);
                el.classList.add("snake");

                if (i === 0) {
                    // head
                    if (dir === "up") el.classList.add("snake-head-up");
                    if (dir === "down") el.classList.add("snake-head-down");
                    if (dir === "left") el.classList.add("snake-head-left");
                    if (dir === "right") el.classList.add("snake-head-right");

                } else if (i === snake.length - 1) {
                    // tail
                    const prev = snake[i - 1];
                    if (prev.y < seg.y) el.classList.add("snake-tail-down");
                    if (prev.y > seg.y) el.classList.add("snake-tail-up");
                    if (prev.x < seg.x) el.classList.add("snake-tail-right");
                    if (prev.x > seg.x) el.classList.add("snake-tail-left");

                } else {
                    const prev = snake[i - 1];
                    const next = snake[i + 1];

                    const dirPrev = getDirection(seg, prev);
                    const dirNext = getDirection(seg, next);

                    if (
                        (dirPrev === "up" && dirNext === "right") ||
                        (dirPrev === "right" && dirNext === "up")
                    ) {
                        el.classList.add("snake-corner-ur");
                    } else if (
                        (dirPrev === "up" && dirNext === "left") ||
                        (dirPrev === "left" && dirNext === "up")
                    ) {
                        el.classList.add("snake-corner-ul");
                    } else if (
                        (dirPrev === "down" && dirNext === "right") ||
                        (dirPrev === "right" && dirNext === "down")
                    ) {
                        el.classList.add("snake-corner-dr");
                    } else if (
                        (dirPrev === "down" && dirNext === "left") ||
                        (dirPrev === "left" && dirNext === "down")
                    ) {
                        el.classList.add("snake-corner-dl");
                    } else {
                        if (dirPrev === "up" || dirPrev === "down")
                            el.classList.add("snake-body-v");
                        else
                            el.classList.add("snake-body-h");
                    }
                }
            });
        }

        function resetGame() {
            document.querySelectorAll(".snake").forEach(e => e.classList.remove("snake"));
            document.querySelectorAll(".food").forEach(e => e.classList.remove("food"));
            clearSnakeGraphics();
            snake = [{ x: 10, y: 10 },
                     {x: 9, y: 10},
                     {x: 8, y: 10}
            ];
            dir = "right";
            drawSnake();
            spawnFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(gameStep, 250);
        }

        function gameOver() {
            clearInterval(gameInterval);
            alert("Game Over!");
            resetGame();
        }

        drawSnake();
        spawnFood();
        gameInterval = setInterval(gameStep, 150);
    </script>
</body>

</html>
